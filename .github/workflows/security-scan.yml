name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unicode-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for invisible Unicode attacks
        run: |
          echo "Scanning for invisible Unicode characters in source files..."
          FOUND=$(find . -type f \( -name '*.js' -o -name '*.ts' -o -name '*.jsx' -o -name '*.tsx' -o -name '*.mjs' -o -name '*.cjs' -o -name '*.py' -o -name '*.rs' -o -name '*.go' -o -name '*.rb' -o -name '*.java' -o -name '*.c' -o -name '*.cpp' -o -name '*.h' -o -name '*.cs' -o -name '*.sh' \) \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -not -path './venv/*' \
            -not -path './.venv/*' \
            -not -path './build/*' \
            -not -path './dist/*' \
            -exec grep -Prl '[\x{FE00}-\x{FE0F}\x{E0100}-\x{E01EF}\x{202A}-\x{202E}\x{2066}-\x{2069}]' {} \;)
          if [ -n "$FOUND" ]; then
            echo "::error::Invisible Unicode characters detected in:"
            echo "$FOUND"
            exit 1
          fi
          echo "No invisible Unicode threats detected."
